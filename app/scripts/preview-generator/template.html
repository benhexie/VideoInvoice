<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoInvoice Preview Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg:            "#FAFAFA",
              surface:       "#FFFFFF",
              raised:        "#F4F4F5",
              border:        "#E4E4E7",
              "border-sub":  "#D4D4D8",
              text:          "#09090B",
              "text-sec":    "#71717A",
              "text-ter":    "#A1A1AA",
              accent:        "#4F46E5",
              "accent-l":    "#6366F1",
              "accent-sub":  "rgba(79,70,229,0.10)",
              success:       "#059669",
              "success-sub": "rgba(16,185,129,0.08)",
              error:         "#DC2626",
              "error-sub":   "rgba(239,68,68,0.06)",
              warning:       "#D97706",
            },
            fontFamily: {
              sans: ["-apple-system", "BlinkMacSystemFont", '"Segoe UI"', "Roboto", "Helvetica", "Arial", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #c8cde0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      ::-webkit-scrollbar { width: 0px; background: transparent; }
      #device-frame {
        width: 414px;
        height: 896px;
        background-color: #FAFAFA;
        position: relative;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.35);
      }
    </style>
  </head>
  <body>
    <div id="device-frame" class="flex flex-col bg-bg">

      <!-- Status Bar -->
      <div class="h-[47px] w-full flex justify-between items-end px-6 pb-2 z-50 bg-bg absolute top-0">
        <span class="font-semibold text-[15px] tracking-tight text-text">9:41</span>
        <div class="flex gap-1.5 items-center">
          <i data-lucide="signal"       class="w-4 h-4 text-text" style="stroke-width:2.5"></i>
          <i data-lucide="wifi"         class="w-4 h-4 text-text" style="stroke-width:2.5"></i>
          <i data-lucide="battery-full" class="w-5 h-5 text-text" style="stroke-width:2.5"></i>
        </div>
      </div>

      <!-- Content -->
      <div id="content" class="flex-1 flex flex-col pt-[47px] pb-[73px] relative overflow-y-auto bg-bg"></div>

      <!-- Tab Bar -->
      <div id="tab-bar"
           class="h-[73px] bg-surface border-t border-border flex flex-row justify-around items-start pt-3 absolute bottom-0 w-full z-50">
      </div>
    </div>

    <script>
      const params  = new URLSearchParams(window.location.search);
      const screen  = params.get("screen") || "capture";
      const content = document.getElementById("content");
      const tabBar  = document.getElementById("tab-bar");

      const renderTabBar = (activeTab) => {
        const tabs = [
          { id: "capture",  icon: "camera",    label: "Capture"  },
          { id: "invoices", icon: "file-text", label: "Invoices" },
          { id: "profile",  icon: "user",      label: "Profile"  },
        ];
        tabBar.innerHTML = tabs.map((tab) => {
          const isActive = tab.id === activeTab;
          const color = isActive ? "#4F46E5" : "#A1A1AA";
          return `
            <div class="flex flex-col items-center gap-1 w-20">
              <i data-lucide="${tab.icon}" style="color:${color};width:24px;height:24px;stroke-width:${isActive ? 2.5 : 2}"></i>
              <span style="font-size:10px;font-weight:${isActive ? 700 : 500};color:${color}">${tab.label}</span>
            </div>`;
        }).join("");

        if (["detail", "preview", "settings"].includes(screen)) {
          tabBar.style.display = "none";
          content.style.paddingBottom = "0";
        } else {
          tabBar.style.display = "flex";
        }
        if (window.lucide) window.lucide.createIcons();
      };

      // ─── SCREENS ─────────────────────────────────────────────────────────────

      const screens = {

        // ── 1. CAPTURE ──────────────────────────────────────────────────────────
        capture: () => {
          renderTabBar("capture");
          return `
            <div class="flex flex-col h-full bg-bg">

              <!-- Top bar -->
              <div class="flex justify-between items-center px-5 pt-3 pb-3 bg-bg">
                <img src="../../assets/images/logo-black.png" style="height:20px;width:auto;object-fit:contain" alt="VideoInvoice" />
                <div class="flex items-center gap-1.5 bg-surface border border-border rounded-full px-3 py-1.5">
                  <i data-lucide="dollar-sign" style="width:14px;height:14px;color:#4F46E5;stroke-width:2.5"></i>
                  <span class="text-text text-[13px] font-semibold">USD</span>
                </div>
              </div>

              <!-- Mode Pills -->
              <div class="flex flex-row gap-2 px-5 pb-3">
                <div class="flex items-center gap-1.5 bg-accent rounded-full px-4 py-2">
                  <i data-lucide="video" style="width:14px;height:14px;color:#fff;stroke-width:2.5"></i>
                  <span class="text-white text-[13px] font-semibold">Video</span>
                </div>
                <div class="flex items-center gap-1.5 bg-surface border border-border rounded-full px-4 py-2">
                  <i data-lucide="type" style="width:14px;height:14px;color:#A1A1AA;stroke-width:2"></i>
                  <span class="text-text-ter text-[13px] font-medium">Text</span>
                </div>
                <div class="flex items-center gap-1.5 bg-surface border border-border rounded-full px-4 py-2">
                  <i data-lucide="paperclip" style="width:14px;height:14px;color:#A1A1AA;stroke-width:2"></i>
                  <span class="text-text-ter text-[13px] font-medium">Document</span>
                </div>
              </div>

              <!-- Camera Viewfinder -->
              <div class="flex-1 relative flex items-center justify-center overflow-hidden" style="min-height:360px">
                <img src="../../../web/public/job-site.jpg"
                     style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover" alt="" />

                <!-- Corner markers -->
                <div class="absolute top-5 left-5 w-8 h-8 border-t-2 border-l-2 border-accent-l opacity-80 rounded-tl-sm"></div>
                <div class="absolute top-5 right-5 w-8 h-8 border-t-2 border-r-2 border-accent-l opacity-80 rounded-tr-sm"></div>
                <div class="absolute bottom-16 left-5 w-8 h-8 border-b-2 border-l-2 border-accent-l opacity-80 rounded-bl-sm"></div>
                <div class="absolute bottom-16 right-5 w-8 h-8 border-b-2 border-r-2 border-accent-l opacity-80 rounded-br-sm"></div>

                <!-- REC badge -->
                <div class="absolute top-4 right-14 flex items-center gap-1.5 bg-error rounded-full px-2.5 py-1">
                  <div class="w-2 h-2 bg-white rounded-full"></div>
                  <span class="text-white text-[11px] font-bold tracking-wider">REC</span>
                </div>

                <!-- Timer -->
                <div class="absolute top-4 right-4">
                  <span class="text-white text-[13px] font-mono font-semibold">0:08</span>
                </div>

                <!-- Record button -->
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
                  <div class="rounded-full border-[3px] border-white flex items-center justify-center" style="width:72px;height:72px">
                    <div class="bg-error rounded-full" style="width:44px;height:44px"></div>
                  </div>
                  <span class="text-white text-[11px] font-medium opacity-80">Tap to stop</span>
                </div>

                <!-- Flip camera -->
                <div class="absolute bottom-8 right-6 w-10 h-10 bg-black/40 rounded-full flex items-center justify-center">
                  <i data-lucide="refresh-cw" style="width:18px;height:18px;color:#fff;stroke-width:2"></i>
                </div>
              </div>

              <!-- Price list chips -->
              <div class="px-5 pt-4 pb-2 bg-bg flex items-center gap-2">
                <div class="flex items-center gap-2 bg-surface border border-border rounded-full px-3 py-1.5">
                  <i data-lucide="file-text" style="width:13px;height:13px;color:#A1A1AA;stroke-width:2"></i>
                  <span class="text-text-ter text-[12px]">No price list</span>
                </div>
                <div class="flex items-center gap-2 rounded-full px-3 py-1.5"
                     style="background:rgba(79,70,229,0.10);border:1px solid rgba(79,70,229,0.4)">
                  <i data-lucide="plus" style="width:13px;height:13px;color:#4F46E5;stroke-width:2"></i>
                  <span style="color:#4F46E5;font-size:12px;font-weight:600">Add price list</span>
                </div>
              </div>
            </div>`;
        },

        // ── 2. INVOICES ─────────────────────────────────────────────────────────
        invoices: () => {
          renderTabBar("invoices");

          const makeCard = ({ name, date, total, status, statusColor, statusBg, statusBorder, currency }) => `
            <div style="background:#FFFFFF;border:1px solid #E4E4E7;border-radius:20px;overflow:hidden;
                        display:flex;flex-direction:row;margin-bottom:12px;
                        box-shadow:0 2px 8px rgba(0,0,0,0.06)">
              <div style="width:3px;background:#4F46E5;flex-shrink:0"></div>
              <div style="flex:1;padding:16px 15px">
                <div style="display:flex;flex-direction:row;justify-content:space-between;align-items:center;margin-bottom:11px">
                  <div style="display:flex;flex-direction:row;align-items:center">
                    <div style="width:42px;height:42px;border-radius:13px;background:rgba(79,70,229,0.10);
                                display:flex;align-items:center;justify-content:center;flex-shrink:0">
                      <i data-lucide="file-text" style="width:20px;height:20px;color:#6366F1;stroke-width:2"></i>
                    </div>
                    <div style="margin-left:10px;background:rgba(5,150,105,0.08);
                                border:1px solid rgba(5,150,105,0.2);padding:3px 10px;border-radius:12px">
                      <span style="color:#059669;font-size:12px;font-weight:600;letter-spacing:0.5px">Invoice</span>
                    </div>
                  </div>
                  <div style="width:34px;height:34px;border-radius:17px;background:rgba(220,38,38,0.06);
                              display:flex;align-items:center;justify-content:center;flex-shrink:0">
                    <i data-lucide="trash-2" style="width:16px;height:16px;color:#DC2626;stroke-width:2"></i>
                  </div>
                </div>
                <p style="font-size:17px;font-weight:700;color:#09090B;margin-bottom:10px;
                           white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.2px">${name}</p>
                <div style="display:flex;flex-direction:row;justify-content:space-between;align-items:center">
                  <span style="font-size:13px;color:#A1A1AA;font-weight:500">${date}</span>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
                    <span style="font-size:22px;font-weight:800;color:#09090B;letter-spacing:-0.5px">${currency}${total}</span>
                    <span style="font-size:11px;font-weight:700;padding:2px 8px;border-radius:8px;
                                 border:1px solid ${statusBorder};color:${statusColor};background:${statusBg}">${status}</span>
                  </div>
                </div>
              </div>
            </div>`;

          return `
            <div class="flex flex-col h-full bg-bg">

              <!-- Header -->
              <div style="padding:20px 24px 14px">
                <h1 style="font-size:32px;font-weight:700;color:#09090B;letter-spacing:-0.5px;margin:0">Invoices</h1>
                <p style="font-size:15px;color:#A1A1AA;margin-top:4px">Your generated quotes</p>
              </div>

              <!-- Filter pills -->
              <div style="display:flex;flex-direction:row;gap:8px;padding:0 20px 14px;overflow-x:auto">
                <div style="display:flex;align-items:center;gap:6px;background:#4F46E5;border-radius:9999px;
                            padding:6px 12px;flex-shrink:0">
                  <span style="color:#fff;font-size:13px;font-weight:700">All</span>
                  <div style="min-width:18px;height:18px;border-radius:9px;background:rgba(255,255,255,0.25);
                              display:flex;align-items:center;justify-content:center;padding:0 4px">
                    <span style="font-size:10px;font-weight:700;color:#fff">5</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;background:#FFFFFF;border:1.5px solid #E4E4E7;
                            border-radius:9999px;padding:5px 12px;flex-shrink:0">
                  <div style="width:8px;height:8px;border-radius:4px;background:#DC2626"></div>
                  <span style="color:#71717A;font-size:13px;font-weight:600">Unpaid</span>
                  <div style="min-width:18px;height:18px;border-radius:9px;background:#F4F4F5;
                              display:flex;align-items:center;justify-content:center;padding:0 4px">
                    <span style="font-size:10px;font-weight:700;color:#71717A">2</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;background:#FFFFFF;border:1.5px solid #E4E4E7;
                            border-radius:9999px;padding:5px 12px;flex-shrink:0">
                  <div style="width:8px;height:8px;border-radius:4px;background:#D97706"></div>
                  <span style="color:#71717A;font-size:13px;font-weight:600">Partial</span>
                  <div style="min-width:18px;height:18px;border-radius:9px;background:#F4F4F5;
                              display:flex;align-items:center;justify-content:center;padding:0 4px">
                    <span style="font-size:10px;font-weight:700;color:#71717A">1</span>
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:6px;background:#FFFFFF;border:1.5px solid #E4E4E7;
                            border-radius:9999px;padding:5px 12px;flex-shrink:0">
                  <div style="width:8px;height:8px;border-radius:4px;background:#059669"></div>
                  <span style="color:#71717A;font-size:13px;font-weight:600">Paid</span>
                  <div style="min-width:18px;height:18px;border-radius:9px;background:#F4F4F5;
                              display:flex;align-items:center;justify-content:center;padding:0 4px">
                    <span style="font-size:10px;font-weight:700;color:#71717A">2</span>
                  </div>
                </div>
              </div>

              <!-- Invoice list -->
              <div style="flex:1;overflow-y:auto;padding:4px 16px 16px">
                ${makeCard({ name:"Bathroom Remodel",   date:"Jun 27, 2026", total:"3,840.00", currency:"$", status:"Unpaid",  statusColor:"#DC2626", statusBg:"rgba(220,38,38,0.06)",  statusBorder:"#DC2626" })}
                ${makeCard({ name:"Kitchen Renovation", date:"Jun 22, 2026", total:"12,500.00",currency:"$", status:"Partial", statusColor:"#D97706", statusBg:"rgba(217,119,6,0.08)",  statusBorder:"#D97706" })}
                ${makeCard({ name:"HVAC Installation",  date:"Jun 15, 2026", total:"2,200.00", currency:"$", status:"Paid",    statusColor:"#059669", statusBg:"rgba(5,150,105,0.08)",  statusBorder:"#059669" })}
                ${makeCard({ name:"Deck Replacement",   date:"Jun 10, 2026", total:"4,650.00", currency:"$", status:"Unpaid",  statusColor:"#DC2626", statusBg:"rgba(220,38,38,0.06)",  statusBorder:"#DC2626" })}
                ${makeCard({ name:"Drywall & Painting", date:"Jun 4, 2026",  total:"1,900.00", currency:"$", status:"Paid",    statusColor:"#059669", statusBg:"rgba(5,150,105,0.08)",  statusBorder:"#059669" })}
              </div>
            </div>`;
        },

        // ── 3. DETAIL ───────────────────────────────────────────────────────────
        detail: () => {
          renderTabBar("detail");

          const makeItem = (qty, desc, price) => `
            <div style="background:#FFFFFF;border-radius:16px;padding:13px 15px;margin-bottom:8px;
                        display:flex;flex-direction:row;align-items:center;
                        box-shadow:0 1px 4px rgba(0,0,0,0.06);border:1px solid #E4E4E7">
              <div style="flex:1">
                <div style="margin-bottom:5px">
                  <span style="background:rgba(79,70,229,0.10);border-radius:8px;padding:2px 8px;
                               font-size:11px;font-weight:700;color:#4F46E5">${qty}x</span>
                </div>
                <p style="font-size:14px;color:#09090B;margin:0">${desc}</p>
              </div>
              <div style="display:flex;flex-direction:row;align-items:center;gap:8px;flex-shrink:0;margin-left:10px">
                <span style="font-size:15px;font-weight:700;color:#09090B">${price}</span>
                <i data-lucide="edit-2" style="width:15px;height:15px;color:#A1A1AA;stroke-width:2"></i>
                <i data-lucide="trash-2" style="width:14px;height:14px;color:#DC2626;stroke-width:2"></i>
              </div>
            </div>`;

          return `
            <div class="flex flex-col h-full bg-bg">

              <!-- Header -->
              <div style="display:flex;flex-direction:row;align-items:center;
                          padding:6px 6px 6px 4px;border-bottom:1px solid #E4E4E7;background:#FAFAFA">
                <div style="padding:8px">
                  <i data-lucide="chevron-left" style="width:24px;height:24px;color:#09090B;stroke-width:2.5"></i>
                </div>
                <span style="flex:1;font-size:18px;font-weight:700;color:#09090B;
                             white-space:nowrap;overflow:hidden;text-overflow:ellipsis">Bathroom Remodel</span>
                <div style="display:flex;flex-direction:row;align-items:center">
                  <div style="padding:8px;border-radius:12px">
                    <i data-lucide="eye" style="width:22px;height:22px;color:#71717A;stroke-width:2"></i>
                  </div>
                  <div style="padding:8px;border-radius:12px">
                    <i data-lucide="share" style="width:22px;height:22px;color:#71717A;stroke-width:2"></i>
                  </div>
                  <div style="padding:8px;border-radius:12px">
                    <i data-lucide="trash-2" style="width:22px;height:22px;color:#DC2626;stroke-width:2"></i>
                  </div>
                </div>
              </div>

              <!-- Scrollable body -->
              <div style="flex:1;overflow-y:auto;padding:12px 16px 4px">

                <!-- Original Request (collapsed) -->
                <div style="background:#FFFFFF;border:1px solid #E4E4E7;border-radius:16px;
                            padding:14px 16px;margin-bottom:14px;
                            display:flex;flex-direction:row;justify-content:space-between;align-items:center;
                            box-shadow:0 1px 4px rgba(0,0,0,0.05)">
                  <div style="display:flex;flex-direction:row;align-items:center;gap:8px">
                    <i data-lucide="message-square" style="width:16px;height:16px;color:#71717A;stroke-width:2"></i>
                    <span style="font-size:14px;font-weight:600;color:#09090B">Original Request</span>
                  </div>
                  <i data-lucide="chevron-down" style="width:20px;height:20px;color:#A1A1AA;stroke-width:2"></i>
                </div>

                <!-- Generated Invoice header + chips -->
                <div style="margin-bottom:14px">
                  <p style="font-size:16px;font-weight:700;color:#09090B;margin:0 0 10px">Generated Invoice</p>
                  <div style="display:flex;flex-direction:row;gap:8px">
                    <div style="display:flex;flex-direction:row;align-items:center;gap:5px;
                                background:#FFFFFF;border:1px solid #E4E4E7;border-radius:20px;padding:5px 11px">
                      <i data-lucide="dollar-sign" style="width:13px;height:13px;color:#71717A;stroke-width:2"></i>
                      <span style="font-size:13px;color:#71717A">USD</span>
                      <i data-lucide="chevron-down" style="width:13px;height:13px;color:#A1A1AA;stroke-width:2"></i>
                    </div>
                    <div style="display:flex;flex-direction:row;align-items:center;gap:5px;
                                background:#FFFFFF;border:1px solid #E4E4E7;border-radius:20px;padding:5px 11px">
                      <i data-lucide="layout" style="width:13px;height:13px;color:#71717A;stroke-width:2"></i>
                      <span style="font-size:13px;color:#71717A">Modern</span>
                      <i data-lucide="chevron-down" style="width:13px;height:13px;color:#A1A1AA;stroke-width:2"></i>
                    </div>
                  </div>
                </div>

                <!-- Line items -->
                ${makeItem(200, "Subway tile 4×12 (sqft)", "$900.00")}
                ${makeItem(8,   "Demo & prep (hrs)",        "$600.00")}
                ${makeItem(16,  "Tile installation (hrs)",  "$1,360.00")}
                ${makeItem(6,   "Grouting & sealing (hrs)", "$390.00")}

                <!-- Add Item -->
                <div style="display:flex;flex-direction:row;align-items:center;justify-content:center;
                            gap:8px;border:1.5px dashed rgba(79,70,229,0.4);border-radius:12px;
                            padding:12px;margin-bottom:14px">
                  <i data-lucide="plus" style="width:18px;height:18px;color:#4F46E5;stroke-width:2.5"></i>
                  <span style="font-size:14px;font-weight:600;color:#4F46E5">Add Item</span>
                </div>

                <!-- Total card -->
                <div style="background:#4F46E5;border-radius:16px;padding:14px 18px;
                            display:flex;flex-direction:row;justify-content:space-between;align-items:center;
                            margin-bottom:12px;box-shadow:0 4px 14px rgba(79,70,229,0.3)">
                  <span style="font-size:16px;font-weight:700;color:#fff">Total</span>
                  <span style="font-size:26px;font-weight:800;color:#fff">$3,650.00</span>
                </div>

                <!-- Payment status row -->
                <div style="display:flex;flex-direction:row;align-items:center;
                            justify-content:space-between;padding:6px 4px;margin-bottom:8px">
                  <div style="display:flex;flex-direction:row;align-items:center;gap:8px">
                    <i data-lucide="credit-card" style="width:18px;height:18px;color:#71717A;stroke-width:2"></i>
                    <span style="font-size:14px;font-weight:600;color:#09090B">Payment</span>
                  </div>
                  <span style="font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px;
                               border:1px solid #DC2626;color:#DC2626;background:rgba(220,38,38,0.06)">Unpaid</span>
                </div>

              </div>

              <!-- AI chat bar -->
              <div style="padding:8px 16px 16px;background:#FAFAFA;border-top:1px solid #E4E4E7">
                <div style="display:flex;align-items:center;gap:12px;background:#FFFFFF;
                            border:1px solid rgba(79,70,229,0.35);border-radius:12px;padding:12px 14px;
                            box-shadow:0 1px 4px rgba(0,0,0,0.05)">
                  <i data-lucide="sparkles" style="width:18px;height:18px;color:#4F46E5;stroke-width:2;flex-shrink:0"></i>
                  <span style="flex:1;font-size:13px;color:#A1A1AA">Bump all labor by 10%...</span>
                  <div style="width:32px;height:32px;background:#4F46E5;border-radius:16px;
                              display:flex;align-items:center;justify-content:center;flex-shrink:0">
                    <i data-lucide="send" style="width:14px;height:14px;color:#fff;stroke-width:2.5"></i>
                  </div>

                </div>
              </div>

              <!-- Logout -->
              <div style="padding:0 24px 16px">
                <div style="display:flex;flex-direction:row;align-items:center;justify-content:center;
                            background:rgba(220,38,38,0.06);padding:16px;border-radius:16px;
                            border:1px solid #DC2626;gap:8px">
                  <i data-lucide="log-out" style="width:20px;height:20px;color:#DC2626;stroke-width:2"></i>
                  <span style="color:#DC2626;font-size:16px;font-weight:600">Log Out</span>
                </div>
              </div>

            </div>`;
        },

      }; // end screens

      if (screens[screen]) {
        content.innerHTML = screens[screen]();
      } else {
        content.innerHTML = '<div class="flex items-center justify-center h-full" style="color:#DC2626">Screen not found</div>';
      }

      if (window.lucide) {
        window.lucide.createIcons();
      } else {
        window.onload = () => { if (window.lucide) window.lucide.createIcons(); };
      }
    </script>
  </body>
</html>
