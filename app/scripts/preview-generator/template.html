<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoInvoice Preview Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              bg:            "#09090B",
              surface:       "#18181B",
              raised:        "#27272A",
              border:        "#27272A",
              "border-sub":  "#3F3F46",
              text:          "#FAFAFA",
              "text-sec":    "#A1A1AA",
              "text-ter":    "#71717A",
              accent:        "#4F46E5",
              "accent-l":    "#818CF8",
              "accent-sub":  "rgba(79,70,229,0.15)",
              success:       "#10B981",
              "success-sub": "rgba(16,185,129,0.10)",
              error:         "#EF4444",
              "error-sub":   "rgba(239,68,68,0.08)",
              warning:       "#F59E0B",
            },
            fontFamily: {
              sans: ["-apple-system", "BlinkMacSystemFont", '"Segoe UI"', "Roboto", "Helvetica", "Arial", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #1a1a2e;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      ::-webkit-scrollbar { width: 0px; background: transparent; }

      #device-frame {
        width: 414px;
        height: 896px;
        background-color: #09090B;
        position: relative;
        overflow: hidden;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.6);
      }

      .status-bar-text { color: #FAFAFA; }

      /* Camera viewfinder grid */
      .viewfinder {
        background: #0a0a0f;
        background-image:
          linear-gradient(rgba(79,70,229,0.08) 1px, transparent 1px),
          linear-gradient(90deg, rgba(79,70,229,0.08) 1px, transparent 1px);
        background-size: 40px 40px;
      }
    </style>
  </head>
  <body>
    <div id="device-frame" class="flex flex-col bg-bg">

      <!-- Status Bar -->
      <div class="h-[47px] w-full flex justify-between items-end px-6 pb-2 z-50 bg-bg absolute top-0">
        <span class="font-semibold text-[15px] tracking-tight text-text">9:41</span>
        <div class="flex gap-1.5 items-center">
          <i data-lucide="signal"      class="w-4 h-4 text-text" style="stroke-width:2.5"></i>
          <i data-lucide="wifi"        class="w-4 h-4 text-text" style="stroke-width:2.5"></i>
          <i data-lucide="battery-full" class="w-5 h-5 text-text" style="stroke-width:2.5"></i>
        </div>
      </div>

      <!-- Content -->
      <div id="content" class="flex-1 flex flex-col pt-[47px] pb-[73px] relative overflow-y-auto bg-bg"></div>

      <!-- Tab Bar -->
      <div id="tab-bar"
           class="h-[73px] bg-bg border-t border-border flex flex-row justify-around items-start pt-3 absolute bottom-0 w-full z-50">
      </div>
    </div>

    <script>
      const params = new URLSearchParams(window.location.search);
      const screen = params.get("screen") || "capture";
      const content  = document.getElementById("content");
      const tabBar   = document.getElementById("tab-bar");

      const renderTabBar = (activeTab) => {
        const tabs = [
          { id: "capture",  icon: "camera",    label: "Capture"  },
          { id: "invoices", icon: "file-text", label: "Invoices" },
          { id: "profile",  icon: "user",      label: "Profile"  },
        ];
        tabBar.innerHTML = tabs.map((tab) => {
          const isActive = tab.id === activeTab;
          const color = isActive ? "#4F46E5" : "#71717A";
          return `
            <div class="flex flex-col items-center gap-1 w-20">
              <i data-lucide="${tab.icon}" style="color:${color};width:24px;height:24px;stroke-width:${isActive ? 2.5 : 2}"></i>
              <span style="font-size:10px;font-weight:${isActive ? 700 : 500};color:${color}">${tab.label}</span>
            </div>`;
        }).join("");

        if (["detail", "preview"].includes(screen)) {
          tabBar.style.display = "none";
          content.style.paddingBottom = "0";
        } else {
          tabBar.style.display = "flex";
        }
        if (window.lucide) window.lucide.createIcons();
      };

      // ─── SCREENS ─────────────────────────────────────────────────────────────

      const screens = {

        // ── 1. CAPTURE ──────────────────────────────────────────────────────────
        capture: () => {
          renderTabBar("capture");
          return `
            <div class="flex flex-col h-full bg-bg">

              <!-- Top bar -->
              <div class="flex justify-between items-center px-5 pt-3 pb-3 bg-bg">
                <img src="../../assets/images/logo-white.png" style="height:26px;width:auto;object-fit:contain" alt="VideoInvoice" />
                <div class="flex items-center gap-1.5 bg-raised border border-border rounded-full px-3 py-1.5">
                  <i data-lucide="dollar-sign" style="width:14px;height:14px;color:#4F46E5;stroke-width:2.5"></i>
                  <span class="text-text text-[13px] font-semibold">USD</span>
                </div>
              </div>

              <!-- Mode Pills -->
              <div class="flex flex-row gap-2 px-5 pb-3">
                <div class="flex items-center gap-1.5 bg-accent rounded-full px-4 py-2">
                  <i data-lucide="video" style="width:14px;height:14px;color:#fff;stroke-width:2.5"></i>
                  <span class="text-white text-[13px] font-semibold">Video</span>
                </div>
                <div class="flex items-center gap-1.5 bg-raised border border-border rounded-full px-4 py-2">
                  <i data-lucide="type" style="width:14px;height:14px;color:#A1A1AA;stroke-width:2"></i>
                  <span class="text-text-sec text-[13px] font-medium">Text</span>
                </div>
                <div class="flex items-center gap-1.5 bg-raised border border-border rounded-full px-4 py-2">
                  <i data-lucide="paperclip" style="width:14px;height:14px;color:#A1A1AA;stroke-width:2"></i>
                  <span class="text-text-sec text-[13px] font-medium">Document</span>
                </div>
              </div>

              <!-- Camera Viewfinder -->
              <div class="viewfinder flex-1 relative flex items-center justify-center" style="min-height:380px">
                <!-- Corner markers -->
                <div class="absolute top-5 left-5 w-8 h-8 border-t-2 border-l-2 border-accent-l opacity-80 rounded-tl-sm"></div>
                <div class="absolute top-5 right-5 w-8 h-8 border-t-2 border-r-2 border-accent-l opacity-80 rounded-tr-sm"></div>
                <div class="absolute bottom-16 left-5 w-8 h-8 border-b-2 border-l-2 border-accent-l opacity-80 rounded-bl-sm"></div>
                <div class="absolute bottom-16 right-5 w-8 h-8 border-b-2 border-r-2 border-accent-l opacity-80 rounded-br-sm"></div>

                <!-- REC badge -->
                <div class="absolute top-4 right-14 flex items-center gap-1.5 bg-error rounded-full px-2.5 py-1">
                  <div class="w-2 h-2 bg-white rounded-full"></div>
                  <span class="text-white text-[11px] font-bold tracking-wider">REC</span>
                </div>

                <!-- Timer -->
                <div class="absolute top-4 right-4">
                  <span class="text-white text-[13px] font-mono font-semibold">0:08</span>
                </div>

                <!-- Record button -->
                <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2">
                  <div class="w-18 h-18 rounded-full border-[3px] border-white flex items-center justify-center" style="width:72px;height:72px">
                    <div class="w-10 h-10 bg-error rounded-full" style="width:44px;height:44px"></div>
                  </div>
                  <span class="text-white text-[11px] font-medium opacity-80">Tap to stop</span>
                </div>

                <!-- Flip camera -->
                <div class="absolute bottom-8 right-6 w-10 h-10 bg-black/40 rounded-full flex items-center justify-center">
                  <i data-lucide="refresh-cw" style="width:18px;height:18px;color:#fff;stroke-width:2"></i>
                </div>
              </div>

              <!-- Price list chips -->
              <div class="px-5 pt-4 pb-2 bg-bg flex items-center gap-2">
                <div class="flex items-center gap-2 bg-raised border border-border-sub rounded-full px-3 py-1.5">
                  <i data-lucide="file-text" style="width:13px;height:13px;color:#71717A;stroke-width:2"></i>
                  <span class="text-text-ter text-[12px]">No price list</span>
                </div>
                <div class="flex items-center gap-2 bg-raised border border-border-sub rounded-full px-3 py-1.5 cursor-pointer">
                  <i data-lucide="plus" style="width:13px;height:13px;color:#71717A;stroke-width:2"></i>
                  <span class="text-text-ter text-[12px]">Add price list</span>
                </div>
              </div>
            </div>`;
        },

        // ── 2. INVOICES ─────────────────────────────────────────────────────────
        invoices: () => {
          renderTabBar("invoices");

          const makeCard = ({ name, date, total, status, statusColor, statusBg, currency }) => {
            const badgeStyle = `background:${statusBg};color:${statusColor};font-size:11px;font-weight:700;padding:3px 10px;border-radius:9999px`;
            return `
              <div class="bg-surface border border-border rounded-2xl p-4 flex flex-row items-center gap-3">
                <div class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0" style="background:rgba(79,70,229,0.15)">
                  <i data-lucide="file-text" style="width:20px;height:20px;color:#818CF8;stroke-width:2"></i>
                </div>
                <div class="flex-1 min-w-0">
                  <p class="text-text font-semibold text-[15px] truncate">${name}</p>
                  <p class="text-text-ter text-[12px] mt-0.5">${date}</p>
                </div>
                <div class="flex flex-col items-end gap-1.5">
                  <span class="text-text font-bold text-[15px]">${currency}${total}</span>
                  <span style="${badgeStyle}">${status}</span>
                </div>
              </div>`;
          };

          return `
            <div class="flex flex-col h-full bg-bg">
              <!-- Header -->
              <div class="px-5 pt-4 pb-4 bg-bg">
                <div class="flex items-center justify-between">
                  <h1 class="text-[28px] font-bold text-text">Invoices</h1>
                  <div class="w-8 h-8 bg-raised rounded-full flex items-center justify-center">
                    <i data-lucide="search" style="width:16px;height:16px;color:#A1A1AA;stroke-width:2"></i>
                  </div>
                </div>
              </div>

              <!-- Filter chips -->
              <div class="flex flex-row gap-2 px-5 pb-4 overflow-x-auto">
                <div class="flex items-center bg-accent rounded-full px-4 py-1.5 flex-shrink-0">
                  <span style="color:#fff;font-size:13px;font-weight:700">All</span>
                </div>
                <div class="flex items-center gap-1.5 bg-raised border border-border rounded-full px-4 py-1.5 flex-shrink-0">
                  <div class="w-2 h-2 rounded-full bg-error"></div>
                  <span style="color:#A1A1AA;font-size:13px;font-weight:500">Unpaid</span>
                </div>
                <div class="flex items-center gap-1.5 bg-raised border border-border rounded-full px-4 py-1.5 flex-shrink-0">
                  <div class="w-2 h-2 rounded-full bg-warning"></div>
                  <span style="color:#A1A1AA;font-size:13px;font-weight:500">Partial</span>
                </div>
                <div class="flex items-center gap-1.5 bg-raised border border-border rounded-full px-4 py-1.5 flex-shrink-0">
                  <div class="w-2 h-2 rounded-full bg-success"></div>
                  <span style="color:#A1A1AA;font-size:13px;font-weight:500">Paid</span>
                </div>
              </div>

              <!-- Invoice list -->
              <div class="flex-1 overflow-y-auto px-5 space-y-3 pb-4">
                ${makeCard({ name:"Bathroom Remodel",    date:"Jun 27 · 8 line items", total:"3,840.00", currency:"$", status:"UNPAID",  statusColor:"#EF4444", statusBg:"rgba(239,68,68,0.12)" })}
                ${makeCard({ name:"Kitchen Renovation",  date:"Jun 22 · 14 line items", total:"12,500.00", currency:"$", status:"PARTIAL",  statusColor:"#F59E0B", statusBg:"rgba(245,158,11,0.12)" })}
                ${makeCard({ name:"HVAC Installation",   date:"Jun 15 · 5 line items", total:"2,200.00", currency:"$", status:"PAID",    statusColor:"#10B981", statusBg:"rgba(16,185,129,0.12)" })}
                ${makeCard({ name:"Deck Replacement",    date:"Jun 10 · 6 line items", total:"4,650.00", currency:"$", status:"UNPAID",  statusColor:"#EF4444", statusBg:"rgba(239,68,68,0.12)" })}
                ${makeCard({ name:"Drywall & Painting",  date:"Jun 4 · 7 line items", total:"1,900.00", currency:"$", status:"PAID",    statusColor:"#10B981", statusBg:"rgba(16,185,129,0.12)" })}
              </div>
            </div>`;
        },

        // ── 3. DETAIL ───────────────────────────────────────────────────────────
        detail: () => {
          renderTabBar("detail");

          const makeItem = (name, qty, unit, price, total) => `
            <div class="flex flex-row items-center py-3 border-b border-border">
              <div class="flex-1 min-w-0">
                <p class="text-text text-[14px] font-medium truncate">${name}</p>
                ${qty ? `<p class="text-text-ter text-[12px] mt-0.5">${qty} ${unit} × $${price}</p>` : `<p class="text-text-ter text-[12px] mt-0.5">Fixed fee</p>`}
              </div>
              <span class="text-text font-semibold text-[14px] ml-3">$${total}</span>
            </div>`;

          const makeSection = (label, color, items) => `
            <div class="mb-1">
              <div class="flex items-center gap-2 py-2.5">
                <div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${color}"></div>
                <span style="font-size:11px;font-weight:700;letter-spacing:0.08em;color:#71717A">${label}</span>
              </div>
              ${items}
            </div>`;

          return `
            <div class="flex flex-col h-full bg-bg">

              <!-- Header -->
              <div class="flex items-center gap-2 px-4 pt-3 pb-3 bg-bg border-b border-border">
                <div class="w-9 h-9 rounded-full bg-raised flex items-center justify-center flex-shrink-0">
                  <i data-lucide="chevron-left" style="width:20px;height:20px;color:#FAFAFA;stroke-width:2.5"></i>
                </div>
                <div class="flex-1 min-w-0">
                  <h1 class="text-text font-bold text-[16px] truncate">Bathroom Remodel</h1>
                  <p class="text-text-ter text-[12px]">Jun 27, 2026</p>
                </div>
                <div class="flex gap-2">
                  <div class="w-9 h-9 rounded-full bg-raised flex items-center justify-center">
                    <i data-lucide="share" style="width:18px;height:18px;color:#A1A1AA;stroke-width:2"></i>
                  </div>
                  <div class="w-9 h-9 rounded-full bg-accent flex items-center justify-center">
                    <i data-lucide="file-text" style="width:18px;height:18px;color:#fff;stroke-width:2"></i>
                  </div>
                </div>
              </div>

              <!-- Summary card -->
              <div class="mx-4 mt-4 bg-surface border border-border rounded-2xl p-4 flex flex-row items-center justify-between">
                <div>
                  <p class="text-text-sec text-[12px] font-medium">Total</p>
                  <p class="text-text text-[28px] font-bold mt-0.5">$3,650.00</p>
                </div>
                <div class="flex flex-col items-end gap-2">
                  <div class="flex items-center gap-1.5 rounded-full px-3 py-1.5" style="background:rgba(239,68,68,0.12)">
                    <div class="w-2 h-2 rounded-full bg-error"></div>
                    <span style="color:#EF4444;font-size:12px;font-weight:700">UNPAID</span>
                  </div>
                  <div class="flex items-center gap-1.5 rounded-full px-3 py-1.5 bg-raised border border-border">
                    <i data-lucide="credit-card" style="width:12px;height:12px;color:#A1A1AA;stroke-width:2"></i>
                    <span style="color:#A1A1AA;font-size:12px;font-weight:500">Mark paid</span>
                  </div>
                </div>
              </div>

              <!-- Line items -->
              <div class="flex-1 overflow-y-auto px-4 mt-4">
                ${makeSection("MATERIALS", "#818CF8", [
                  makeItem("Subway tile 4×12",    200, "sqft", "4.50",  "900.00"),
                  makeItem("Cement board",         50, "sheets","8.00", "400.00"),
                  makeItem("Grout & adhesive",     "", "",      "",     "120.00"),
                ].join(""))}
                ${makeSection("LABOR", "#10B981", [
                  makeItem("Demo & prep",           8, "hrs",  "75.00", "600.00"),
                  makeItem("Tile installation",    16, "hrs",  "85.00","1,360.00"),
                  makeItem("Grouting & sealing",    6, "hrs",  "65.00", "390.00"),
                ].join(""))}
                ${makeSection("FEES", "#F59E0B", [
                  makeItem("Permit fee",           "", "",      "",     "150.00"),
                  makeItem("Disposal",             "", "",      "",     "130.00"),
                ].join(""))}

                <!-- Total row -->
                <div class="flex justify-between items-center py-4 border-t-2 border-border-sub mt-1 mb-2">
                  <span class="text-text font-bold text-[16px]">Total</span>
                  <span class="text-accent-l font-bold text-[20px]">$3,650.00</span>
                </div>
              </div>

              <!-- AI edit bar -->
              <div class="px-4 pb-4 pt-2 bg-bg border-t border-border">
                <div class="flex items-center gap-3 bg-surface border border-accent rounded-xl px-4 py-3" style="border-color:rgba(79,70,229,0.4)">
                  <i data-lucide="sparkles" style="width:18px;height:18px;color:#4F46E5;stroke-width:2;flex-shrink:0"></i>
                  <span class="flex-1 text-text-ter text-[13px]">Bump all labor by 10%...</span>
                  <div class="w-8 h-8 bg-accent rounded-full flex items-center justify-center flex-shrink-0">
                    <i data-lucide="send" style="width:14px;height:14px;color:#fff;stroke-width:2.5"></i>
                  </div>
                </div>
              </div>
            </div>`;
        },

        // ── 4. PREVIEW ──────────────────────────────────────────────────────────
        preview: () => {
          renderTabBar("preview");
          return `
            <div class="flex flex-col h-full bg-bg">

              <!-- Header -->
              <div class="flex items-center gap-2 px-4 pt-3 pb-3 bg-bg border-b border-border">
                <div class="w-9 h-9 rounded-full bg-raised flex items-center justify-center flex-shrink-0">
                  <i data-lucide="chevron-left" style="width:20px;height:20px;color:#FAFAFA;stroke-width:2.5"></i>
                </div>
                <span class="flex-1 text-text font-bold text-[16px]">Invoice Preview</span>
                <div class="flex gap-2">
                  <div class="w-9 h-9 rounded-full bg-raised flex items-center justify-center">
                    <i data-lucide="share" style="width:18px;height:18px;color:#A1A1AA;stroke-width:2"></i>
                  </div>
                  <div class="w-9 h-9 rounded-full bg-raised flex items-center justify-center">
                    <i data-lucide="download" style="width:18px;height:18px;color:#A1A1AA;stroke-width:2"></i>
                  </div>
                </div>
              </div>

              <!-- Template picker strip -->
              <div class="flex gap-2 px-4 py-3 border-b border-border overflow-x-auto">
                ${[
                  {name:"Modern",  color:"#4F46E5", active:true},
                  {name:"Classic", color:"#2563EB", active:false},
                  {name:"Minimal", color:"#52525B", active:false},
                  {name:"Premium", color:"#7C3AED", active:false},
                  {name:"Elegant", color:"#D4AF37", active:false},
                  {name:"Bold",    color:"#E11D48", active:false},
                ].map(t => `
                  <div class="flex flex-col items-center gap-1 flex-shrink-0">
                    <div class="w-9 h-12 rounded-lg flex items-end justify-center pb-1.5 overflow-hidden"
                         style="background:${t.active ? t.color : '#27272A'};border:2px solid ${t.active ? t.color : '#3F3F46'}">
                      ${t.active ? `<div class="w-4 h-4 rounded-full bg-white/20 flex items-center justify-center"><i data-lucide="check" style="width:10px;height:10px;color:#fff;stroke-width:3"></i></div>` : ""}
                    </div>
                    <span style="font-size:10px;color:${t.active ? '#818CF8' : '#71717A'};font-weight:${t.active ? 700 : 400}">${t.name}</span>
                  </div>`
                ).join("")}
              </div>

              <!-- Invoice paper -->
              <div class="flex-1 bg-[#1a1a2e] flex items-start justify-center pt-4 px-3 pb-3 overflow-y-auto">
                <div class="bg-white w-full rounded-lg shadow-2xl overflow-hidden" style="min-height:620px">

                  <!-- Indigo header -->
                  <div class="px-6 pt-6 pb-5 flex flex-row justify-between items-start" style="background:linear-gradient(135deg,#4F46E5 0%,#3730A3 100%)">
                    <div>
                      <p class="text-white/70 text-[10px] font-semibold uppercase tracking-widest mb-1">Invoice</p>
                      <p class="text-white font-bold text-[20px] tracking-tight">Ryan's Electric</p>
                      <p class="text-white/70 text-[11px] mt-0.5">123 Oak St, Portland OR 97201</p>
                      <p class="text-white/70 text-[11px]">(503) 555-0190</p>
                    </div>
                    <div class="text-right">
                      <p class="text-white/70 text-[10px] font-semibold tracking-widest">INV-0024</p>
                      <p class="text-white font-bold text-[13px] mt-1">Jun 27, 2026</p>
                      <div class="mt-2 bg-white/20 rounded-full px-3 py-1">
                        <span class="text-white text-[11px] font-bold">DUE Jul 11</span>
                      </div>
                    </div>
                  </div>

                  <!-- Bill To -->
                  <div class="px-6 py-4 bg-gray-50 border-b border-gray-100">
                    <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-1.5">Bill To</p>
                    <p class="text-gray-900 font-semibold text-[13px]">James Wilson</p>
                    <p class="text-gray-500 text-[11px]">Maple Street Properties</p>
                    <p class="text-gray-500 text-[11px]">45 Maple St, Portland OR 97204</p>
                  </div>

                  <!-- Items table header -->
                  <div class="px-6 pt-4">
                    <div class="flex flex-row pb-2 border-b-2" style="border-color:#4F46E5">
                      <span class="flex-1 text-[9px] font-bold uppercase tracking-wider text-gray-400">Description</span>
                      <span class="w-10 text-right text-[9px] font-bold uppercase tracking-wider text-gray-400">Qty</span>
                      <span class="w-14 text-right text-[9px] font-bold uppercase tracking-wider text-gray-400">Rate</span>
                      <span class="w-16 text-right text-[9px] font-bold uppercase tracking-wider text-gray-400">Amount</span>
                    </div>

                    ${[
                      {name:"Subway tile 4×12",    group:"Materials", qty:"200 sqft", rate:"$4.50",  amt:"$900.00"},
                      {name:"Cement board",         group:"",          qty:"50 sheets",rate:"$8.00",  amt:"$400.00"},
                      {name:"Demo & prep",          group:"Labor",     qty:"8 hrs",   rate:"$75.00", amt:"$600.00"},
                      {name:"Tile installation",    group:"",          qty:"16 hrs",  rate:"$85.00", amt:"$1,360.00"},
                      {name:"Grouting & sealing",   group:"",          qty:"6 hrs",   rate:"$65.00", amt:"$390.00"},
                      {name:"Permit fee",           group:"Fees",      qty:"1",       rate:"$150.00",amt:"$150.00"},
                      {name:"Disposal",             group:"",          qty:"1",       rate:"$130.00",amt:"$130.00"},
                    ].map(row => `
                      ${row.group ? `<p class="text-[8px] font-bold uppercase tracking-wider mt-3 mb-1" style="color:#4F46E5">${row.group}</p>` : ""}
                      <div class="flex flex-row items-baseline py-1.5 border-b border-gray-50">
                        <span class="flex-1 text-gray-700 text-[11px]">${row.name}</span>
                        <span class="w-10 text-right text-gray-500 text-[10px]">${row.qty}</span>
                        <span class="w-14 text-right text-gray-500 text-[10px]">${row.rate}</span>
                        <span class="w-16 text-right text-gray-900 font-medium text-[11px]">${row.amt}</span>
                      </div>`
                    ).join("")}
                  </div>

                  <!-- Total -->
                  <div class="mx-6 mt-4 mb-6 rounded-xl px-4 py-3 flex justify-between items-center" style="background:#4F46E5">
                    <span class="text-white font-bold text-[14px]">Total Due</span>
                    <span class="text-white font-bold text-[20px]">$3,650.00</span>
                  </div>
                </div>
              </div>
            </div>`;
        },

        // ── 5. SETTINGS ─────────────────────────────────────────────────────────
        settings: () => {
          renderTabBar("profile");

          const makeField = (icon, label, value) => `
            <div class="mb-4">
              <label style="font-size:12px;font-weight:600;color:#A1A1AA;display:block;margin-bottom:6px">${label}</label>
              <div class="flex items-center gap-3 bg-surface border border-border rounded-xl px-4 py-3">
                <i data-lucide="${icon}" style="width:17px;height:17px;color:#71717A;stroke-width:2;flex-shrink:0"></i>
                <span style="font-size:14px;color:#FAFAFA">${value}</span>
              </div>
            </div>`;

          return `
            <div class="flex flex-col h-full bg-bg">
              <!-- Header -->
              <div class="flex items-center gap-3 px-5 pt-4 pb-4 bg-bg border-b border-border">
                <div class="w-9 h-9 rounded-full bg-raised flex items-center justify-center flex-shrink-0">
                  <i data-lucide="chevron-left" style="width:20px;height:20px;color:#FAFAFA;stroke-width:2.5"></i>
                </div>
                <h1 class="text-text font-bold text-[18px]">Business Settings</h1>
              </div>

              <div class="flex-1 overflow-y-auto px-5 pt-5 pb-4 space-y-6">

                <!-- Logo -->
                <div class="flex flex-col items-center">
                  <div class="w-20 h-20 rounded-2xl bg-raised border-2 border-dashed border-border-sub flex items-center justify-center relative">
                    <i data-lucide="image" style="width:28px;height:28px;color:#52525B;stroke-width:1.5"></i>
                    <div class="absolute -bottom-2 -right-2 w-7 h-7 bg-accent rounded-full flex items-center justify-center border-2 border-bg">
                      <i data-lucide="camera" style="width:13px;height:13px;color:#fff;stroke-width:2.5"></i>
                    </div>
                  </div>
                  <p class="text-text-ter text-[12px] mt-3">Tap to add company logo</p>
                </div>

                <!-- Business info -->
                <div>
                  <p class="text-text font-semibold text-[15px] mb-4">Business Info</p>
                  ${makeField("building-2",  "Company Name", "Ryan's Electric")}
                  ${makeField("map-pin",      "Address",      "123 Oak St, Portland OR 97201")}
                  ${makeField("phone",        "Phone",        "(503) 555-0190")}
                  ${makeField("mail",         "Email",        "ryan@ryanselectric.com")}
                </div>

                <!-- Template picker -->
                <div>
                  <p class="text-text font-semibold text-[15px] mb-3">Invoice Template</p>
                  <div class="grid grid-cols-3 gap-3">
                    ${[
                      {name:"Modern",  color:"#4F46E5", active:true},
                      {name:"Classic", color:"#2563EB", active:false},
                      {name:"Minimal", color:"#52525B", active:false},
                      {name:"Premium", color:"#7C3AED", active:false},
                      {name:"Elegant", color:"#D4AF37", active:false},
                      {name:"Bold",    color:"#E11D48", active:false},
                    ].map(t => `
                      <div class="flex flex-col items-center gap-2">
                        <div class="w-full h-16 rounded-xl relative overflow-hidden flex items-center justify-center"
                             style="background:${t.active ? t.color : '#27272A'};border:2px solid ${t.active ? t.color : '#3F3F46'}">
                          <div class="absolute inset-0 flex flex-col p-2 gap-1">
                            <div class="h-2 rounded-sm" style="background:${t.active ? 'rgba(255,255,255,0.4)' : '#3F3F46'};width:60%"></div>
                            <div class="h-1 rounded-sm" style="background:${t.active ? 'rgba(255,255,255,0.2)' : '#3F3F46'};width:90%"></div>
                            <div class="h-1 rounded-sm" style="background:${t.active ? 'rgba(255,255,255,0.2)' : '#3F3F46'};width:75%"></div>
                          </div>
                          ${t.active ? `
                          <div class="absolute top-1.5 right-1.5 w-5 h-5 rounded-full bg-white/30 flex items-center justify-center">
                            <i data-lucide="check" style="width:11px;height:11px;color:#fff;stroke-width:3"></i>
                          </div>` : ""}
                        </div>
                        <span style="font-size:11px;color:${t.active ? '#818CF8' : '#71717A'};font-weight:${t.active ? 700 : 400}">${t.name}</span>
                      </div>`
                    ).join("")}
                  </div>
                </div>

                <!-- Currency -->
                <div>
                  <p class="text-text font-semibold text-[15px] mb-3">Currency</p>
                  <div class="flex items-center gap-3 bg-surface border border-border rounded-xl px-4 py-3">
                    <i data-lucide="dollar-sign" style="width:17px;height:17px;color:#71717A;stroke-width:2"></i>
                    <span class="flex-1 text-text text-[14px]">USD — US Dollar</span>
                    <i data-lucide="chevron-right" style="width:16px;height:16px;color:#52525B;stroke-width:2"></i>
                  </div>
                </div>

                <!-- Signature -->
                <div>
                  <p class="text-text font-semibold text-[15px] mb-3">Signature</p>
                  <div class="bg-surface border border-dashed border-border-sub rounded-xl px-4 py-5 flex flex-col items-center gap-2">
                    <i data-lucide="pen-tool" style="width:24px;height:24px;color:#52525B;stroke-width:1.5"></i>
                    <span class="text-text-ter text-[12px]">No signature added</span>
                    <div class="mt-1 bg-raised border border-border rounded-full px-4 py-1.5">
                      <span style="color:#818CF8;font-size:13px;font-weight:600">+ Add Signature</span>
                    </div>
                  </div>
                </div>

                <!-- Save button -->
                <div class="bg-accent rounded-2xl py-4 flex items-center justify-center gap-2">
                  <i data-lucide="check" style="width:20px;height:20px;color:#fff;stroke-width:2.5"></i>
                  <span class="text-white font-bold text-[16px]">Save Settings</span>
                </div>

              </div>
            </div>`;
        },

      }; // end screens

      if (screens[screen]) {
        content.innerHTML = screens[screen]();
      } else {
        content.innerHTML = '<div class="flex items-center justify-center h-full" style="color:#EF4444">Screen not found</div>';
      }

      if (window.lucide) {
        window.lucide.createIcons();
      } else {
        window.onload = () => { if (window.lucide) window.lucide.createIcons(); };
      }
    </script>
  </body>
</html>
